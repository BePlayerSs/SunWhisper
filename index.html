<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SunWhisper</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0d12;
      color: #f5f5f5;
      text-align: center;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #cfcfcf;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 24px;
      background: #7a4ea6;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .card {
      margin-top: 40px;
      padding: 25px;
      background: #151922;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SunWhisper</h1>
    <p>Bienvenido a la página temporal del servidor.</p>
    <p>Aquí pronto encontrarás información sobre VIPs, kits, beneficios, comandos y contenido especial.</p>

    <a class="btn" href="#">Entrar al Discord</a>

    <div class="card">
      <h2>Próximamente</h2>
      <p>Ranks VIP, kits exclusivos, dinero, ventajas, comandos y más.</p>
    </div>
  </div>
</body>
</html>
